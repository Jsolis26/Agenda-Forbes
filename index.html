<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Agenda Forbes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    min-height:100dvh;
}

img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
    -webkit-touch-callout:none;
    animation:fade .35s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(.98);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

</style>

</head>

<body>

<img src="agenda.jpg" alt="Agenda Forbes">

</body>

</html>
